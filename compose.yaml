services:
  backend:
    build: ./ujin-backend
    container_name: backend
    environment:
      POSTGRES_HOST: database
      POSTGRES_PORT: 5432
      POSTGRES_DB: ujin
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      REDIS_HOST: redis
    ports:
      - "8080:8080"
    networks:
      - ujin
  database:
    image: postgres:latest
    container_name: database
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ujin
    networks:
      - ujin
  redis:
    image: redis:latest
    container_name: redis
    networks:
      - ujin

networks:
  ujin:
    driver: bridge